<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #075e54; color: white; padding: 15px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; word-wrap: break-word; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; border: 1px solid #ddd; }
        .input-box { padding: 15px; border-top: 1px solid #ddd; display: flex; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><strong>{{ user.username }}</strong></div>
        <div id="chat"></div>
        <div class="input-box">
            <input id="message" type="text" placeholder="Type a message...">
            <button onclick="sendMessage()">></button>
        </div>
    </div>
    <script>
        var socket = io();
        var myName = "{{ user.username }}";
        socket.on('message', function(data) {
            var chat = document.getElementById('chat');
            var div = document.createElement('div');
            div.className = 'msg ' + (data.user === myName ? 'sent' : 'received');
            div.innerHTML = `<strong>${data.user}:</strong> <br> ${data.message}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });
        function sendMessage() {
            var input = document.getElementById('message');
            if(input.value) {
                socket.emit('message', {message: input.value});
                input.value = '';
            }
        }
    </script>
</body>
</html>
